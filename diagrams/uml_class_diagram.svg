<svg viewBox="0 0 1020 700" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif" font-size="11.5">
  <defs>
    <marker id="inherit" markerWidth="12" markerHeight="12" refX="6" refY="10" orient="auto">
      <polygon points="6 0, 12 10, 0 10" fill="white" stroke="#555" stroke-width="1.5"/>
    </marker>
    <marker id="assoc" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="dep" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#888"/>
    </marker>
    <marker id="compose" markerWidth="12" markerHeight="12" refX="6" refY="6" orient="auto">
      <polygon points="6 0, 12 6, 6 12, 0 6" fill="#333"/>
    </marker>
  </defs>

  <rect width="1020" height="700" fill="#f9f9fb" rx="12"/>
  <text x="510" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">IntentFlow — UML Class Diagram</text>

  <!-- ====== ABSTRACT BASES ====== -->
  <!-- BaseRepository -->
  <g id="base-repo">
    <rect x="20" y="55" width="175" height="95" rx="5" fill="white" stroke="#777" stroke-width="1.5" stroke-dasharray="5,3"/>
    <rect x="20" y="55" width="175" height="26" rx="5" fill="#777"/>
    <text x="107" y="65" text-anchor="middle" fill="#ddd" font-size="9">«abstract»</text>
    <text x="107" y="77" text-anchor="middle" fill="white" font-weight="bold">BaseRepository</text>
    <line x1="20" y1="81" x2="195" y2="81" stroke="#aaa" stroke-width="1"/>
    <text x="30" y="97" fill="#333">+ findById(id)</text>
    <text x="30" y="112" fill="#333">+ create(data)</text>
    <text x="30" y="127" fill="#333">+ update(id, data)</text>
    <text x="30" y="142" fill="#333">+ delete(id)</text>
  </g>

  <!-- BaseService -->
  <g id="base-svc">
    <rect x="215" y="55" width="175" height="80" rx="5" fill="white" stroke="#777" stroke-width="1.5" stroke-dasharray="5,3"/>
    <rect x="215" y="55" width="175" height="26" rx="5" fill="#777"/>
    <text x="302" y="65" text-anchor="middle" fill="#ddd" font-size="9">«abstract»</text>
    <text x="302" y="77" text-anchor="middle" fill="white" font-weight="bold">BaseService</text>
    <line x1="215" y1="81" x2="390" y2="81" stroke="#aaa" stroke-width="1"/>
    <text x="225" y="97" fill="#555" font-style="italic">- repository: BaseRepository</text>
    <text x="225" y="112" fill="#333">+ execute()</text>
    <text x="225" y="127" fill="#333">+ validate()</text>
  </g>

  <!-- BaseController -->
  <g id="base-ctrl">
    <rect x="410" y="55" width="175" height="80" rx="5" fill="white" stroke="#777" stroke-width="1.5" stroke-dasharray="5,3"/>
    <rect x="410" y="55" width="175" height="26" rx="5" fill="#777"/>
    <text x="497" y="65" text-anchor="middle" fill="#ddd" font-size="9">«abstract»</text>
    <text x="497" y="77" text-anchor="middle" fill="white" font-weight="bold">BaseController</text>
    <line x1="410" y1="81" x2="585" y2="81" stroke="#aaa" stroke-width="1"/>
    <text x="420" y="97" fill="#555" font-style="italic">- service: BaseService</text>
    <text x="420" y="112" fill="#333">+ handleRequest(req, res)</text>
    <text x="420" y="127" fill="#333">+ sendResponse(res, data)</text>
  </g>

  <!-- ApiResponse -->
  <g id="api-resp">
    <rect x="605" y="55" width="185" height="80" rx="5" fill="white" stroke="#e67e22" stroke-width="1.5"/>
    <rect x="605" y="55" width="185" height="26" rx="5" fill="#e67e22"/>
    <text x="697" y="65" text-anchor="middle" fill="#fff" font-size="9">«factory»</text>
    <text x="697" y="77" text-anchor="middle" fill="white" font-weight="bold">ApiResponse&lt;T&gt;</text>
    <line x1="605" y1="81" x2="790" y2="81" stroke="#daa" stroke-width="1"/>
    <text x="615" y="97" fill="#333">+ success(data: T)</text>
    <text x="615" y="112" fill="#333">+ error(message, code)</text>
    <text x="615" y="127" fill="#555" font-size="10">Singleton factory</text>
  </g>

  <!-- ====== CAMPAIGN MODULE ====== -->
  <!-- CampaignController -->
  <g id="campaign-ctrl">
    <rect x="20" y="200" width="185" height="110" rx="5" fill="white" stroke="#4a90d9" stroke-width="1.8"/>
    <rect x="20" y="200" width="185" height="26" rx="5" fill="#4a90d9"/>
    <text x="112" y="218" text-anchor="middle" fill="white" font-weight="bold">CampaignController</text>
    <line x1="20" y1="226" x2="205" y2="226" stroke="#aad" stroke-width="1"/>
    <text x="30" y="244" fill="#333">+ createCampaign(req, res)</text>
    <text x="30" y="260" fill="#333">+ ingestTurn(req, res)</text>
    <text x="30" y="276" fill="#333">+ getActiveTree(req, res)</text>
    <text x="30" y="292" fill="#333">+ refireCampaign(req, res)</text>
    <text x="30" y="308" fill="#555" font-size="10">extends BaseController</text>
  </g>

  <!-- CampaignService -->
  <g id="campaign-svc">
    <rect x="225" y="200" width="195" height="130" rx="5" fill="white" stroke="#4a90d9" stroke-width="1.8"/>
    <rect x="225" y="200" width="195" height="26" rx="5" fill="#4a90d9"/>
    <text x="322" y="218" text-anchor="middle" fill="white" font-weight="bold">CampaignService</text>
    <line x1="225" y1="226" x2="420" y2="226" stroke="#aad" stroke-width="1"/>
    <text x="235" y="244" fill="#333">+ createCampaign(dto)</text>
    <text x="235" y="260" fill="#333">+ ingestTurn(campaignId, dto)</text>
    <text x="235" y="276" fill="#333">+ getActiveTree(campaignId)</text>
    <text x="235" y="292" fill="#333">+ refireCampaign(campaignId)</text>
    <text x="235" y="308" fill="#555" font-style="italic">- buildPromptTree(turn)</text>
    <text x="235" y="324" fill="#555" font-style="italic">- resolveVersion(id)</text>
    <text x="235" y="340" fill="#555" font-size="10">extends BaseService</text>
  </g>

  <!-- CampaignRepository -->
  <g id="campaign-repo">
    <rect x="20" y="360" width="185" height="110" rx="5" fill="white" stroke="#4a90d9" stroke-width="1.8"/>
    <rect x="20" y="360" width="185" height="26" rx="5" fill="#4a90d9"/>
    <text x="112" y="378" text-anchor="middle" fill="white" font-weight="bold">CampaignRepository</text>
    <line x1="20" y1="384" x2="205" y2="384" stroke="#aad" stroke-width="1"/>
    <text x="30" y="402" fill="#333">+ upsertPromptNode(hash, data)</text>
    <text x="30" y="418" fill="#333">+ findActiveVersion(id)</text>
    <text x="30" y="434" fill="#333">+ createVersion(campaignId)</text>
    <text x="30" y="450" fill="#333">+ getTree(versionId)</text>
    <text x="30" y="466" fill="#555" font-size="10">extends BaseRepository</text>
  </g>

  <!-- ====== AUTH MODULE ====== -->
  <g id="auth-svc">
    <rect x="440" y="200" width="175" height="110" rx="5" fill="white" stroke="#2c3e50" stroke-width="1.8"/>
    <rect x="440" y="200" width="175" height="26" rx="5" fill="#2c3e50"/>
    <text x="527" y="218" text-anchor="middle" fill="white" font-weight="bold">AuthService</text>
    <line x1="440" y1="226" x2="615" y2="226" stroke="#aaa" stroke-width="1"/>
    <text x="450" y="244" fill="#333">+ login(email, password)</text>
    <text x="450" y="260" fill="#333">+ register(dto)</text>
    <text x="450" y="276" fill="#333">+ refreshToken(token)</text>
    <text x="450" y="292" fill="#333">+ logout(userId)</text>
    <text x="450" y="308" fill="#555" font-size="10">extends BaseService</text>
  </g>

  <!-- ====== ENRICHMENT QUEUE ====== -->
  <!-- SemrushQueue -->
  <g id="semrush-queue">
    <rect x="640" y="200" width="175" height="100" rx="5" fill="white" stroke="#6d3b8a" stroke-width="1.8"/>
    <rect x="640" y="200" width="175" height="26" rx="5" fill="#6d3b8a"/>
    <text x="727" y="218" text-anchor="middle" fill="white" font-weight="bold">SemrushQueue</text>
    <line x1="640" y1="226" x2="815" y2="226" stroke="#c5a" stroke-width="1"/>
    <text x="650" y="244" fill="#333">+ addJob(siteUrl)</text>
    <text x="650" y="260" fill="#333">+ process(job)</text>
    <text x="650" y="276" fill="#555" font-style="italic">- client: SemrushClient</text>
    <text x="650" y="295" fill="#555" font-size="10">BullMQ Worker</text>
  </g>

  <!-- SemrushClient -->
  <g id="semrush-client">
    <rect x="840" y="200" width="165" height="95" rx="5" fill="white" stroke="#2e7d32" stroke-width="1.8"/>
    <rect x="840" y="200" width="165" height="26" rx="5" fill="#2e7d32"/>
    <text x="922" y="218" text-anchor="middle" fill="white" font-weight="bold">SemrushClient</text>
    <line x1="840" y1="226" x2="1005" y2="226" stroke="#aca" stroke-width="1"/>
    <text x="850" y="244" fill="#333">+ fetchKeywords(url)</text>
    <text x="850" y="260" fill="#333">+ fetchTraffic(url)</text>
    <text x="850" y="276" fill="#555" font-style="italic">HTTP → SEMrush API</text>
    <text x="850" y="292" fill="#555" font-size="10">«external adapter»</text>
  </g>

  <!-- ====== LEAD INTELLIGENCE ====== -->
  <g id="lead-intel">
    <rect x="225" y="390" width="185" height="100" rx="5" fill="white" stroke="#7b1fa2" stroke-width="1.8"/>
    <rect x="225" y="390" width="185" height="26" rx="5" fill="#7b1fa2"/>
    <text x="317" y="408" text-anchor="middle" fill="white" font-weight="bold">LeadIntelligenceService</text>
    <line x1="225" y1="414" x2="410" y2="414" stroke="#c5a" stroke-width="1"/>
    <text x="235" y="432" fill="#333">+ extractSignals(turnId)</text>
    <text x="235" y="448" fill="#333">+ scoreIntent(text)</text>
    <text x="235" y="464" fill="#333">+ storeLeadSignal(data)</text>
    <text x="235" y="480" fill="#555" font-size="10">extends BaseService</text>
  </g>

  <!-- ====== EXTENSION STRATEGY ====== -->
  <g id="stream-strategy">
    <rect x="440" y="360" width="185" height="80" rx="5" fill="white" stroke="#777" stroke-width="1.5" stroke-dasharray="5,3"/>
    <rect x="440" y="360" width="185" height="26" rx="5" fill="#777"/>
    <text x="532" y="370" text-anchor="middle" fill="#ddd" font-size="9">«interface»</text>
    <text x="532" y="382" text-anchor="middle" fill="white" font-weight="bold">StreamInterceptStrategy</text>
    <line x1="440" y1="386" x2="625" y2="386" stroke="#aaa" stroke-width="1"/>
    <text x="450" y="404" fill="#333">+ intercept(fetch)</text>
    <text x="450" y="420" fill="#333">+ parseTokenStream(raw)</text>
    <text x="450" y="432" fill="#555" font-size="10">+ postToBridge(data)</text>
  </g>

  <!-- ConcreteStrategy examples -->
  <g id="chatgpt-strategy">
    <rect x="440" y="470" width="130" height="60" rx="5" fill="white" stroke="#4a90d9" stroke-width="1.5"/>
    <rect x="440" y="470" width="130" height="22" rx="5" fill="#4a90d9"/>
    <text x="505" y="485" text-anchor="middle" fill="white" font-weight="bold" font-size="10">ChatGPTStrategy</text>
    <text x="450" y="508" fill="#333">+ intercept(fetch)</text>
    <text x="450" y="522" fill="#555" font-size="9">implements Strategy</text>
  </g>

  <g id="claude-strategy">
    <rect x="590" y="470" width="130" height="60" rx="5" fill="white" stroke="#4a90d9" stroke-width="1.5"/>
    <rect x="590" y="470" width="130" height="22" rx="5" fill="#4a90d9"/>
    <text x="655" y="485" text-anchor="middle" fill="white" font-weight="bold" font-size="10">ClaudeStrategy</text>
    <text x="600" y="508" fill="#333">+ intercept(fetch)</text>
    <text x="600" y="522" fill="#555" font-size="9">implements Strategy</text>
  </g>

  <!-- ========= RELATIONSHIPS ========= -->

  <!-- CampaignController extends BaseController -->
  <line x1="112" y1="200" x2="112" y2="135" stroke="#555" stroke-width="1.4" marker-end="url(#inherit)"/>

  <!-- CampaignService extends BaseService -->
  <line x1="322" y1="200" x2="302" y2="135" stroke="#555" stroke-width="1.4" marker-end="url(#inherit)"/>

  <!-- CampaignRepository extends BaseRepository -->
  <line x1="112" y1="360" x2="107" y2="150" stroke="#555" stroke-width="1.4" marker-end="url(#inherit)"/>

  <!-- AuthService extends BaseService -->
  <line x1="527" y1="200" x2="360" y2="135" stroke="#555" stroke-width="1.4" marker-end="url(#inherit)"/>

  <!-- LeadIntelligenceService extends BaseService -->
  <line x1="317" y1="390" x2="302" y2="330" stroke="#555" stroke-width="1.4" marker-end="url(#inherit)"/>

  <!-- CampaignController → CampaignService (uses) -->
  <line x1="205" y1="255" x2="225" y2="255" stroke="#555" stroke-width="1.4" marker-end="url(#assoc)"/>
  <text x="213" y="249" font-size="9" fill="#555">uses</text>

  <!-- CampaignService → CampaignRepository (uses) -->
  <line x1="260" y1="330" x2="150" y2="360" stroke="#555" stroke-width="1.4" marker-end="url(#assoc)"/>
  <text x="180" y="345" font-size="9" fill="#555">uses</text>

  <!-- CampaignService → SemrushQueue (push) -->
  <line x1="420" y1="285" x2="640" y2="265" stroke="#6d3b8a" stroke-width="1.4" stroke-dasharray="5,3" marker-end="url(#dep)"/>
  <text x="515" y="270" font-size="9" fill="#6d3b8a">«push job»</text>

  <!-- CampaignService → LeadIntelligenceService (fire-and-forget) -->
  <line x1="340" y1="330" x2="317" y2="390" stroke="#7b1fa2" stroke-width="1.4" stroke-dasharray="5,3" marker-end="url(#dep)"/>
  <text x="260" y="360" font-size="9" fill="#7b1fa2">«async»</text>

  <!-- SemrushQueue → SemrushClient -->
  <line x1="815" y1="255" x2="840" y2="255" stroke="#2e7d32" stroke-width="1.4" marker-end="url(#assoc)"/>
  <text x="820" y="248" font-size="9" fill="#2e7d32">uses</text>

  <!-- ChatGPTStrategy implements StreamInterceptStrategy -->
  <line x1="505" y1="470" x2="505" y2="440" stroke="#555" stroke-width="1.4" stroke-dasharray="5,3" marker-end="url(#inherit)"/>

  <!-- ClaudeStrategy implements StreamInterceptStrategy -->
  <line x1="655" y1="470" x2="575" y2="440" stroke="#555" stroke-width="1.4" stroke-dasharray="5,3" marker-end="url(#inherit)"/>

  <!-- BaseController uses ApiResponse -->
  <line x1="585" y1="100" x2="605" y2="100" stroke="#e67e22" stroke-width="1.4" stroke-dasharray="5,3" marker-end="url(#dep)"/>
  <text x="590" y="95" font-size="9" fill="#e67e22">«uses»</text>

  <!-- Legend -->
  <rect x="640" y="370" width="370" height="115" rx="6" fill="white" stroke="#ccc" stroke-width="1"/>
  <text x="650" y="388" font-size="11" font-weight="bold" fill="#333">Legend</text>
  <!-- Inheritance -->
  <line x1="650" y1="408" x2="700" y2="408" stroke="#555" stroke-width="1.4"/>
  <polygon points="700,404 710,408 700,412" fill="white" stroke="#555" stroke-width="1.4"/>
  <text x="718" y="412" font-size="10" fill="#444">Inheritance (extends)</text>
  <!-- Dependency -->
  <line x1="650" y1="430" x2="700" y2="430" stroke="#888" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#dep)"/>
  <text x="718" y="434" font-size="10" fill="#444">Dependency (uses / async)</text>
  <!-- Association -->
  <line x1="650" y1="452" x2="700" y2="452" stroke="#555" stroke-width="1.4" marker-end="url(#assoc)"/>
  <text x="718" y="456" font-size="10" fill="#444">Association</text>
  <!-- Abstract -->
  <rect x="650" y="465" width="50" height="16" rx="3" fill="white" stroke="#777" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="675" y="477" text-anchor="middle" font-size="9" fill="#777">«abstract»</text>
  <text x="718" y="477" font-size="10" fill="#444">Abstract / Interface</text>
</svg>
