<svg viewBox="0 0 820 620" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="darr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#999"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="620" fill="#f9f9fb" rx="12"/>

  <!-- Title -->
  <text x="410" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">IntentFlow — Use Case Diagram</text>

  <!-- System boundary -->
  <rect x="180" y="50" width="480" height="540" rx="10" fill="none" stroke="#4a90d9" stroke-width="1.8" stroke-dasharray="6,3"/>
  <text x="420" y="68" text-anchor="middle" font-size="11" fill="#4a90d9" font-weight="bold">IntentFlow System</text>

  <!-- ============ USE CASES ============ -->
  <!-- Auth -->
  <ellipse cx="420" cy="108" rx="90" ry="22" fill="#e8f0fe" stroke="#4a90d9" stroke-width="1.4"/>
  <text x="420" y="113" text-anchor="middle" fill="#1a1a2e">Sign In / Register</text>

  <!-- Capture AI Stream -->
  <ellipse cx="350" cy="185" rx="105" ry="22" fill="#e8f0fe" stroke="#4a90d9" stroke-width="1.4"/>
  <text x="350" y="190" text-anchor="middle" fill="#1a1a2e">Capture AI Stream</text>

  <!-- Create Campaign -->
  <ellipse cx="530" cy="185" rx="100" ry="22" fill="#e8f0fe" stroke="#4a90d9" stroke-width="1.4"/>
  <text x="530" y="190" text-anchor="middle" fill="#1a1a2e">Create Campaign</text>

  <!-- Ingest Turn -->
  <ellipse cx="350" cy="268" rx="95" ry="22" fill="#e8f0fe" stroke="#4a90d9" stroke-width="1.4"/>
  <text x="350" y="273" text-anchor="middle" fill="#1a1a2e">Ingest Turn Data</text>

  <!-- View Campaign Graph -->
  <ellipse cx="540" cy="268" rx="105" ry="22" fill="#e8f0fe" stroke="#4a90d9" stroke-width="1.4"/>
  <text x="540" y="273" text-anchor="middle" fill="#1a1a2e">View Campaign Graph</text>

  <!-- Enrich SEO -->
  <ellipse cx="350" cy="355" rx="105" ry="22" fill="#e8f0fe" stroke="#4a90d9" stroke-width="1.4"/>
  <text x="350" y="360" text-anchor="middle" fill="#1a1a2e">Enrich with SEO Data</text>

  <!-- Refire Campaign -->
  <ellipse cx="540" cy="355" rx="100" ry="22" fill="#e8f0fe" stroke="#4a90d9" stroke-width="1.4"/>
  <text x="540" y="360" text-anchor="middle" fill="#1a1a2e">Refire Campaign</text>

  <!-- Lead Intelligence -->
  <ellipse cx="350" cy="438" rx="110" ry="22" fill="#e8f0fe" stroke="#4a90d9" stroke-width="1.4"/>
  <text x="350" y="443" text-anchor="middle" fill="#1a1a2e">Extract Lead Signals</text>

  <!-- Manage Users (Admin) -->
  <ellipse cx="540" cy="438" rx="100" ry="22" fill="#fde8e8" stroke="#d94a4a" stroke-width="1.4"/>
  <text x="540" y="443" text-anchor="middle" fill="#1a1a2e">Manage Users (Admin)</text>

  <!-- AI Suggestions -->
  <ellipse cx="420" cy="530" rx="115" ry="22" fill="#e8f0fe" stroke="#4a90d9" stroke-width="1.4"/>
  <text x="420" y="535" text-anchor="middle" fill="#1a1a2e">Get AI Prompt Suggestions</text>

  <!-- ============ ACTORS ============ -->
  <!-- User actor left -->
  <circle cx="80" cy="200" r="18" fill="none" stroke="#333" stroke-width="1.8"/>
  <line x1="80" y1="218" x2="80" y2="265" stroke="#333" stroke-width="1.8"/>
  <line x1="55" y1="235" x2="105" y2="235" stroke="#333" stroke-width="1.8"/>
  <line x1="80" y1="265" x2="55" y2="295" stroke="#333" stroke-width="1.8"/>
  <line x1="80" y1="265" x2="105" y2="295" stroke="#333" stroke-width="1.8"/>
  <text x="80" y="315" text-anchor="middle" fill="#1a1a2e" font-weight="bold">User</text>

  <!-- Admin actor left -->
  <circle cx="80" cy="430" r="18" fill="none" stroke="#d94a4a" stroke-width="1.8"/>
  <line x1="80" y1="448" x2="80" y2="495" stroke="#d94a4a" stroke-width="1.8"/>
  <line x1="55" y1="465" x2="105" y2="465" stroke="#d94a4a" stroke-width="1.8"/>
  <line x1="80" y1="495" x2="55" y2="525" stroke="#d94a4a" stroke-width="1.8"/>
  <line x1="80" y1="495" x2="105" y2="525" stroke="#d94a4a" stroke-width="1.8"/>
  <text x="80" y="545" text-anchor="middle" fill="#d94a4a" font-weight="bold">Admin</text>

  <!-- SEMrush/Ahrefs actor right -->
  <circle cx="740" cy="355" r="18" fill="none" stroke="#2e7d32" stroke-width="1.8"/>
  <line x1="740" y1="373" x2="740" y2="420" stroke="#2e7d32" stroke-width="1.8"/>
  <line x1="715" y1="390" x2="765" y2="390" stroke="#2e7d32" stroke-width="1.8"/>
  <line x1="740" y1="420" x2="715" y2="450" stroke="#2e7d32" stroke-width="1.8"/>
  <line x1="740" y1="420" x2="765" y2="450" stroke="#2e7d32" stroke-width="1.8"/>
  <text x="740" y="466" text-anchor="middle" fill="#2e7d32" font-weight="bold" font-size="11">SEMrush /</text>
  <text x="740" y="480" text-anchor="middle" fill="#2e7d32" font-weight="bold" font-size="11">Ahrefs</text>

  <!-- OpenAI actor right -->
  <circle cx="740" cy="530" r="18" fill="none" stroke="#7b1fa2" stroke-width="1.8"/>
  <line x1="740" y1="548" x2="740" y2="590" stroke="#7b1fa2" stroke-width="1.8"/>
  <line x1="715" y1="562" x2="765" y2="562" stroke="#7b1fa2" stroke-width="1.8"/>
  <line x1="740" y1="590" x2="715" y2="610" stroke="#7b1fa2" stroke-width="1.8"/>
  <line x1="740" y1="590" x2="765" y2="610" stroke="#7b1fa2" stroke-width="1.8"/>
  <text x="740" y="618" text-anchor="middle" fill="#7b1fa2" font-weight="bold" font-size="12">OpenAI</text>

  <!-- ============ ASSOCIATIONS ============ -->
  <!-- User → Sign In -->
  <line x1="98" y1="192" x2="330" y2="113" stroke="#555" stroke-width="1.3" marker-end="url(#arr)"/>
  <!-- User → Capture -->
  <line x1="98" y1="204" x2="245" y2="185" stroke="#555" stroke-width="1.3" marker-end="url(#arr)"/>
  <!-- User → Create Campaign -->
  <line x1="98" y1="208" x2="430" y2="185" stroke="#555" stroke-width="1.3" marker-end="url(#arr)"/>
  <!-- User → View Campaign Graph -->
  <line x1="98" y1="212" x2="435" y2="268" stroke="#555" stroke-width="1.3" marker-end="url(#arr)"/>
  <!-- User → Refire Campaign -->
  <line x1="98" y1="215" x2="440" y2="355" stroke="#555" stroke-width="1.3" marker-end="url(#arr)"/>
  <!-- User → Get AI Suggestions -->
  <line x1="98" y1="220" x2="305" y2="530" stroke="#555" stroke-width="1.3" marker-end="url(#arr)"/>

  <!-- Admin → Manage Users -->
  <line x1="98" y1="432" x2="440" y2="438" stroke="#d94a4a" stroke-width="1.3" marker-end="url(#arr)"/>

  <!-- SEMrush → Enrich -->
  <line x1="722" y1="350" x2="455" y2="355" stroke="#2e7d32" stroke-width="1.3" marker-end="url(#arr)"/>

  <!-- OpenAI → AI Suggestions -->
  <line x1="722" y1="530" x2="535" y2="530" stroke="#7b1fa2" stroke-width="1.3" marker-end="url(#arr)"/>

  <!-- <<include>> Capture → Ingest -->
  <line x1="350" y1="207" x2="350" y2="246" stroke="#999" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#darr)"/>
  <text x="360" y="230" font-size="10" fill="#666">«include»</text>

  <!-- <<include>> Ingest → Enrich -->
  <line x1="350" y1="290" x2="350" y2="333" stroke="#999" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#darr)"/>
  <text x="360" y="315" font-size="10" fill="#666">«include»</text>

  <!-- <<include>> Ingest → Lead -->
  <line x1="340" y1="290" x2="330" y2="416" stroke="#999" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#darr)"/>
  <text x="270" y="355" font-size="10" fill="#666">«include»</text>

  <!-- Legend -->
  <rect x="192" y="565" width="14" height="2" fill="#555"/>
  <text x="212" y="571" font-size="10" fill="#444">User association</text>
  <line x1="295" y1="568" x2="309" y2="568" stroke="#999" stroke-width="1.2" stroke-dasharray="4,2"/>
  <text x="315" y="571" font-size="10" fill="#444">«include»</text>
  <rect x="390" y="563" width="12" height="12" rx="2" fill="#fde8e8" stroke="#d94a4a" stroke-width="1"/>
  <text x="408" y="571" font-size="10" fill="#444">Admin only</text>
</svg>
