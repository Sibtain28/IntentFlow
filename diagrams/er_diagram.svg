<svg viewBox="0 0 900 660" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif" font-size="12">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <!-- Crow's foot many -->
    <marker id="many" markerWidth="12" markerHeight="10" refX="0" refY="5" orient="auto">
      <line x1="0" y1="0" x2="10" y2="5" stroke="#555" stroke-width="1.5"/>
      <line x1="0" y1="10" x2="10" y2="5" stroke="#555" stroke-width="1.5"/>
      <line x1="3" y1="0" x2="3" y2="10" stroke="#555" stroke-width="1.5"/>
    </marker>
    <marker id="one" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <line x1="8" y1="0" x2="8" y2="10" stroke="#555" stroke-width="1.5"/>
      <line x1="5" y1="0" x2="5" y2="10" stroke="#555" stroke-width="1.5"/>
    </marker>
  </defs>

  <rect width="900" height="660" fill="#f9f9fb" rx="12"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">IntentFlow — ER Diagram</text>

  <!-- ========= ENTITY BOXES ========= -->
  <!-- Helper macro: each entity = header rect + attr rows -->

  <!-- USER -->
  <g id="user">
    <rect x="20" y="50" width="160" height="130" rx="6" fill="white" stroke="#4a90d9" stroke-width="1.8"/>
    <rect x="20" y="50" width="160" height="28" rx="6" fill="#4a90d9"/>
    <text x="100" y="69" text-anchor="middle" fill="white" font-weight="bold">User</text>
    <text x="30" y="97" fill="#333">id (PK)</text>
    <text x="30" y="114" fill="#333">email</text>
    <text x="30" y="131" fill="#333">password_hash</text>
    <text x="30" y="148" fill="#333">app_role</text>
    <text x="30" y="165" fill="#555" font-size="10">admin | user</text>
  </g>

  <!-- TENANT -->
  <g id="tenant">
    <rect x="220" y="50" width="155" height="115" rx="6" fill="white" stroke="#4a90d9" stroke-width="1.8"/>
    <rect x="220" y="50" width="155" height="28" rx="6" fill="#4a90d9"/>
    <text x="297" y="69" text-anchor="middle" fill="white" font-weight="bold">Tenant</text>
    <text x="230" y="97" fill="#333">id (PK)</text>
    <text x="230" y="114" fill="#333">name</text>
    <text x="230" y="131" fill="#333">domain</text>
    <text x="230" y="148" fill="#555" font-size="10">org/account boundary</text>
  </g>

  <!-- TENANT_MEMBER -->
  <g id="tenant-member">
    <rect x="220" y="200" width="155" height="100" rx="6" fill="white" stroke="#7b9fd4" stroke-width="1.5"/>
    <rect x="220" y="200" width="155" height="28" rx="6" fill="#7b9fd4"/>
    <text x="297" y="219" text-anchor="middle" fill="white" font-weight="bold">TenantMember</text>
    <text x="230" y="247" fill="#333">id (PK)</text>
    <text x="230" y="264" fill="#333">user_id (FK)</text>
    <text x="230" y="281" fill="#333">tenant_id (FK)</text>
    <text x="230" y="298" fill="#333">tenant_role</text>
  </g>

  <!-- CAMPAIGN -->
  <g id="campaign">
    <rect x="420" y="50" width="165" height="115" rx="6" fill="white" stroke="#4a90d9" stroke-width="1.8"/>
    <rect x="420" y="50" width="165" height="28" rx="6" fill="#4a90d9"/>
    <text x="502" y="69" text-anchor="middle" fill="white" font-weight="bold">Campaign</text>
    <text x="430" y="97" fill="#333">id (PK)</text>
    <text x="430" y="114" fill="#333">tenant_id (FK)</text>
    <text x="430" y="131" fill="#333">name</text>
    <text x="430" y="148" fill="#333">created_at</text>
    <text x="430" y="163" fill="#555" font-size="10">one campaign per tenant</text>
  </g>

  <!-- CAMPAIGN_VERSION -->
  <g id="campaign-version">
    <rect x="420" y="205" width="165" height="100" rx="6" fill="white" stroke="#7b9fd4" stroke-width="1.5"/>
    <rect x="420" y="205" width="165" height="28" rx="6" fill="#7b9fd4"/>
    <text x="502" y="224" text-anchor="middle" fill="white" font-weight="bold">CampaignVersion</text>
    <text x="430" y="252" fill="#333">id (PK)</text>
    <text x="430" y="269" fill="#333">campaign_id (FK)</text>
    <text x="430" y="286" fill="#333">version_number</text>
    <text x="430" y="303" fill="#333">created_at</text>
  </g>

  <!-- CAPTURE_SESSION -->
  <g id="capture-session">
    <rect x="420" y="345" width="165" height="100" rx="6" fill="white" stroke="#7b9fd4" stroke-width="1.5"/>
    <rect x="420" y="345" width="165" height="28" rx="6" fill="#7b9fd4"/>
    <text x="502" y="364" text-anchor="middle" fill="white" font-weight="bold">CaptureSession</text>
    <text x="430" y="392" fill="#333">id (PK)</text>
    <text x="430" y="409" fill="#333">version_id (FK)</text>
    <text x="430" y="426" fill="#333">provider</text>
    <text x="430" y="443" fill="#555" font-size="10">chatgpt | claude | etc.</text>
  </g>

  <!-- CAPTURE_TURN -->
  <g id="capture-turn">
    <rect x="420" y="485" width="165" height="100" rx="6" fill="white" stroke="#7b9fd4" stroke-width="1.5"/>
    <rect x="420" y="485" width="165" height="28" rx="6" fill="#7b9fd4"/>
    <text x="502" y="504" text-anchor="middle" fill="white" font-weight="bold">CaptureTurn</text>
    <text x="430" y="532" fill="#333">id (PK)</text>
    <text x="430" y="549" fill="#333">session_id (FK)</text>
    <text x="430" y="566" fill="#333">turn_exchange_id</text>
    <text x="430" y="583" fill="#333">raw_prompt_text</text>
  </g>

  <!-- PROMPT_NODE -->
  <g id="prompt-node">
    <rect x="640" y="205" width="175" height="145" rx="6" fill="white" stroke="#e67e22" stroke-width="1.8"/>
    <rect x="640" y="205" width="175" height="28" rx="6" fill="#e67e22"/>
    <text x="727" y="224" text-anchor="middle" fill="white" font-weight="bold">PromptNode</text>
    <text x="650" y="252" fill="#333">id (PK, SHA-1)</text>
    <text x="650" y="269" fill="#333">version_id (FK)</text>
    <text x="650" y="286" fill="#333">parent_id (FK self)</text>
    <text x="650" y="303" fill="#333">node_type</text>
    <text x="650" y="320" fill="#555" font-size="10">prompt|subquery|site|generated</text>
    <text x="650" y="337" fill="#333">content / url</text>
  </g>

  <!-- SEMRUSH_SNAPSHOT -->
  <g id="semrush">
    <rect x="640" y="395" width="175" height="115" rx="6" fill="white" stroke="#2e7d32" stroke-width="1.8"/>
    <rect x="640" y="395" width="175" height="28" rx="6" fill="#2e7d32"/>
    <text x="727" y="414" text-anchor="middle" fill="white" font-weight="bold">SemrushSnapshot</text>
    <text x="650" y="442" fill="#333">id (PK)</text>
    <text x="650" y="459" fill="#333">node_id (FK)</text>
    <text x="650" y="476" fill="#333">keyword_volume</text>
    <text x="650" y="493" fill="#333">traffic_estimate</text>
    <text x="650" y="510" fill="#555" font-size="10">TTL: 24 hours</text>
  </g>

  <!-- LEAD_SIGNAL -->
  <g id="lead-signal">
    <rect x="640" y="550" width="175" height="95" rx="6" fill="white" stroke="#7b1fa2" stroke-width="1.8"/>
    <rect x="640" y="550" width="175" height="28" rx="6" fill="#7b1fa2"/>
    <text x="727" y="569" text-anchor="middle" fill="white" font-weight="bold">LeadSignal</text>
    <text x="650" y="597" fill="#333">id (PK)</text>
    <text x="650" y="614" fill="#333">turn_id (FK)</text>
    <text x="650" y="631" fill="#333">intent_score</text>
    <text x="650" y="640" fill="#333">signal_type</text>
  </g>

  <!-- ========= RELATIONSHIPS ========= -->

  <!-- User ——< TenantMember -->
  <line x1="100" y1="180" x2="100" y2="225" stroke="#555" stroke-width="1.4"/>
  <line x1="100" y1="225" x2="220" y2="255" stroke="#555" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="110" y="215" font-size="10" fill="#666">1</text>
  <text x="195" y="248" font-size="10" fill="#666">N</text>

  <!-- Tenant ——< TenantMember -->
  <line x1="297" y1="165" x2="297" y2="200" stroke="#555" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="304" y="183" font-size="10" fill="#666">1</text>
  <text x="304" y="198" font-size="10" fill="#666">N</text>

  <!-- Tenant ——< Campaign -->
  <line x1="375" y1="100" x2="420" y2="100" stroke="#555" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="385" y="95" font-size="10" fill="#666">1</text>
  <text x="410" y="95" font-size="10" fill="#666">N</text>

  <!-- Campaign ——< CampaignVersion -->
  <line x1="502" y1="165" x2="502" y2="205" stroke="#555" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="510" y="183" font-size="10" fill="#666">1</text>
  <text x="510" y="202" font-size="10" fill="#666">N</text>

  <!-- CampaignVersion ——< CaptureSession -->
  <line x1="502" y1="305" x2="502" y2="345" stroke="#555" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="510" y="323" font-size="10" fill="#666">1</text>
  <text x="510" y="342" font-size="10" fill="#666">N</text>

  <!-- CaptureSession ——< CaptureTurn -->
  <line x1="502" y1="445" x2="502" y2="485" stroke="#555" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="510" y="463" font-size="10" fill="#666">1</text>
  <text x="510" y="482" font-size="10" fill="#666">N</text>

  <!-- CampaignVersion ——< PromptNode -->
  <line x1="585" y1="255" x2="640" y2="270" stroke="#555" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="590" y="251" font-size="10" fill="#666">1</text>
  <text x="628" y="265" font-size="10" fill="#666">N</text>

  <!-- PromptNode self-ref -->
  <path d="M 815 250 C 860 250 860 290 815 300" fill="none" stroke="#e67e22" stroke-width="1.4" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="826" y="275" font-size="10" fill="#e67e22">parent</text>

  <!-- PromptNode ——< SemrushSnapshot -->
  <line x1="727" y1="350" x2="727" y2="395" stroke="#555" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="735" y="370" font-size="10" fill="#666">1</text>
  <text x="735" y="392" font-size="10" fill="#666">N</text>

  <!-- CaptureTurn ——< LeadSignal -->
  <line x1="585" y1="540" x2="640" y2="590" stroke="#555" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="592" y="558" font-size="10" fill="#666">1</text>
  <text x="628" y="584" font-size="10" fill="#666">N</text>

  <!-- Legend -->
  <rect x="20" y="590" width="380" height="55" rx="6" fill="white" stroke="#ccc" stroke-width="1"/>
  <text x="30" y="608" font-size="11" font-weight="bold" fill="#333">Legend</text>
  <rect x="30" y="615" width="50" height="14" rx="3" fill="#4a90d9"/>
  <text x="88" y="626" font-size="10" fill="#444">Core entity</text>
  <rect x="160" y="615" width="50" height="14" rx="3" fill="#7b9fd4"/>
  <text x="218" y="626" font-size="10" fill="#444">Supporting entity</text>
  <line x1="30" y1="638" x2="55" y2="638" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="62" y="642" font-size="10" fill="#444">Self-referencing (tree)</text>
  <text x="200" y="642" font-size="10" fill="#666">1 and N = cardinality</text>
</svg>
